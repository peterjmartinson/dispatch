watch:
  print_dir: "${PRINT_DIR}"
  email_dir: "${EMAIL_DIR}"

email:
  username: "${EMAIL_USERNAME}"
  password: "${EMAIL_PASSWORD}"
  from_addr: "${EMAIL_USERNAME}"
  to_addr: "${EMAIL_TO}"
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  subject_prefix: "DISPATCH: "

manifest:
  smtp_host: "${MANIFEST_SMTP_HOST}"
  smtp_port: 587
  username: "${MANIFEST_USERNAME}"
  password: "${MANIFEST_PASSWORD}"
  from_addr: "${MANIFEST_FROM_ADDR}"
  alert_to: "${MANIFEST_ALERT_TO}"
  sqlite_path: "${MANIFEST_SQLITE_PATH}"

gmail:
  username: "${GMAIL_USERNAME}"
  app_password: "${GMAIL_APP_PASSWORD}"
  allowed_senders:
    - "${GMAIL_ALLOWED_SENDER_1}"
    - "${GMAIL_ALLOWED_SENDER_2}"
  drop_dir: "${PRINT_DIR}"
  label_mailbox: "Dispatch/Print"
  sqlite_path: "/home/peter/database/gmail_watcher.sqlite3"
  enabled: true
  imap_host: "imap.gmail.com"
  imap_port: 993
