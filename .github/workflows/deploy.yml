name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: read

    env:
      RELEASES_BASE: /home/peter/Code/dispatch_releases
      LIVE_PATH: /home/peter/Code/dispatch_live

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Deploy to release directory
        id: deploy
        run: |
          RELEASE_DIR="$RELEASES_BASE/release_$(date +%Y%m%d%H%M%S)"
          mkdir -p "$RELEASE_DIR"
          rsync -a --exclude='.git' ./ "$RELEASE_DIR/"
          echo "release_dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"

      - name: Install dependencies with uv
        run: |
          RELEASE_DIR="${{ steps.deploy.outputs.release_dir }}"
          cd "$RELEASE_DIR"
          uv sync

      - name: Substitute config placeholders
        env:
          PRINT_DIR: ${{ vars.PRINT_DIR }}
          EMAIL_DIR: ${{ vars.EMAIL_DIR }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_ALLOWED_SENDER_1: ${{ secrets.GMAIL_ALLOWED_SENDER_1 }}
          GMAIL_ALLOWED_SENDER_2: ${{ secrets.GMAIL_ALLOWED_SENDER_2 }}
        run: |
          RELEASE_DIR="${{ steps.deploy.outputs.release_dir }}"
          envsubst < "$RELEASE_DIR/config.yaml" > "$RELEASE_DIR/config.filled.yaml"
          mv "$RELEASE_DIR/config.filled.yaml" "$RELEASE_DIR/config.yaml"

      - name: Make runner scripts executable
        run: chmod +x "${{ steps.deploy.outputs.release_dir }}"/*.sh

      - name: Switch symlink
        run: ln -snf "${{ steps.deploy.outputs.release_dir }}" "$LIVE_PATH"

      - name: Clean up old releases
        run: ls -dt "$RELEASES_BASE"/release_* | tail -n +4 | xargs -r rm -rf
